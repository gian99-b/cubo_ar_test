<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Booleana</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        #ui-container {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 8px;
            max-width: 220px;
        }
        label { display: block; margin-bottom: 5px; font-size: 12px; color: black; }
        input { width: 100%; }
        button { width: 100%; margin-top: 10px; padding: 10px; background: #ff4444; color: white; border: none; border-radius: 4px; font-weight: bold; }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.6.8/build/index.module.js",
            "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="ui-container">
        <label>Larghezza: <input type="range" id="width" min="0.5" max="3" step="0.1" value="2"></label>
        <label>Altezza: <input type="range" id="height" min="0.5" max="2.5" step="0.1" value="1"></label>
        <label>Profondità: <input type="range" id="depth" min="0.5" max="3" step="0.1" value="2"></label>
        <hr>
        <label>Posizione Porta %: <input type="range" id="doorPos" min="0" max="100" step="1" value="10"></label>
        <button id="intersectBtn">TAGLIA PORTA</button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
