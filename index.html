<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modellatore AR Scala 1:10</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        #ui-container {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); padding: 15px; border-radius: 8px;
            max-width: 240px; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        label { display: block; margin-top: 10px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; margin-top: 4px; }
        button { width: 100%; margin-top: 15px; padding: 12px; background: #ff4444; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        #resetBtn { background: #666; margin-top: 8px; }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.6.8/build/index.module.js",
            "three-bvh-csg": "https://unpkg.com/three-bvh-csg@0.0.16/build/index.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="ui-container">
        <label>Larghezza Cubo: <input type="range" id="width" min="0.1" max="1" step="0.05" value="0.5"></label>
        <label>Altezza Cubo: <input type="range" id="height" min="0.1" max="1" step="0.05" value="0.4"></label>
        <label>Profondità Cubo: <input type="range" id="depth" min="0.1" max="1" step="0.05" value="0.5"></label>
        <hr>
        <label>Posizione Porta (0-1): <input type="range" id="doorPos" min="0" max="1" step="0.01" value="0"></label>
        <button id="intersectBtn">TAGLIA PORTA</button>
        <button id="resetBtn">RESET STANZA</button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
