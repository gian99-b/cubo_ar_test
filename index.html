<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubo AR</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <label>Larghezza (X): <input type="range" id="width" min="0.1" max="1" step="0.05" value="0.2"></label><br>
        <label>Altezza (Y): <input type="range" id="height" min="0.1" max="1" step="0.05" value="0.2"></label><br>
        <label>Profondità (Z): <input type="range" id="depth" min="0.1" max="1" step="0.05" value="0.2"></label>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
